<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopEase – Add Product</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>

<nav>
  <a href="index.html" class="nav-brand"><span>🛍️</span> ShopEase</a>
  <div class="nav-links">
    <a href="index.html"><span>🏠</span> Home</a>
    <a href="add-product.html"><span>➕</span> Add Product</a>
    <a href="view-products.html"><span>📦</span> Products</a>
    <a href="cart.html" class="cart-icon">🛒 Cart<span class="cart-badge" id="cart-badge" style="display:none">0</span></a>
  </div>
</nav>

<div class="container">
  <div class="form-card">
    <div class="form-title" id="form-title">➕ Add New Product</div>
    <form id="product-form">
      <div class="form-group">
        <label>Product Name *</label>
        <input type="text" id="name" placeholder="e.g. Wireless Headphones" required />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Price ($) *</label>
          <input type="number" id="price" placeholder="0.00" step="0.01" min="0" required />
        </div>
        <div class="form-group">
          <label>Stock Qty *</label>
          <input type="number" id="stock" placeholder="0" min="0" required />
        </div>
      </div>
      <div class="form-group">
        <label>Category *</label>
        <select id="category" required>
          <option value="">Select category</option>
          <option>Electronics</option>
          <option>Clothing</option>
          <option>Footwear</option>
          <option>Accessories</option>
          <option>Home</option>
          <option>Sports</option>
          <option>Books</option>
          <option>Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea id="description" placeholder="Describe the product..."></textarea>
      </div>
      <div class="form-group">
        <label>Image URL</label>
        <input type="url" id="image" placeholder="https://..." />
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary" id="submit-btn">✓ Save Product</button>
        <a href="view-products.html" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>

<script src="assets/js/app.js"></script>
<script src="assets/js/add-product.js"></script>
</body>
</html>
